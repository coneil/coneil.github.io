<html>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@200;400;900&display=swap"
    rel="stylesheet"
  />

  <style>
    body {
      font-family: "Source Code Pro", monospace;
      font-weight: 200;
      font-size: 17px;
      background-color: #2e3440;
      color: #eceff4;
    }

    strong {
      font-weight: 400;
    }

    h1 {
      color: #d8dee9;
      font-weight: 900;
      font-size: 165px;
      line-height: 140px;
      margin-bottom: 0px;
    }

    #contents {
      margin: 0 auto;
      width: 500px;
      text-align: justify;
      text-justify: inter-word;
      -moz-text-align-last: justify;
      text-align-last: justify;
    }

    a {
      color: #8cb5b5;
      font-weight: 400;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>

  <body>
    <div id="contents">
      <h1>COREY ONEIL</h1>
      <p>
        is a software developer living in
        <a
          href="https://www.google.com/maps/place/Austin,+TX/@30.3076863,-97.8934825,11z/data=!3m1!4b1!4m5!3m4!1s0x8644b599a0cc032f:0x5d9b464bd469d57a!8m2!3d30.267153!4d-97.7430608"
          >Austin, TX</a
        >. He has been working in games for the past 12 years.
      </p>
      <p>
        Corey is currently Vice President of Engineering at
        <a href="https://monumental.io">Monumental</a> and Co-founder of
        <a href="https://stageone.io">StageOne</a>.
      </p>
    </div>
  </body>
</html>
